
# General
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on
set -s escape-time 0

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Solarized dark colour scheme
# Status bar
set -g status-style "bg=#073642,fg=#839496"
set -g status-left "#[fg=#268bd2,bold] #S "
set -g status-right "#[fg=#586e75] %Y-%m-%d #[fg=#839496]%H:%M "
set -g status-left-length 20

# Windows
setw -g window-status-format "#[fg=#586e75] #I:#W "
setw -g window-status-current-format "#[fg=#268bd2,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

# Message/command prompt
set -g message-style "bg=#073642,fg=#b58900"
